version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: campusflow_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Anshu123
      POSTGRES_DB: campusflow_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: campusflow_redis
    restart: always
    ports:
      - "6379:6379"

  server:
    build: ./server
    container_name: campusflow_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      DB_USER: postgres
      DB_HOST: postgres
      DB_NAME: campusflow_db
      DB_PASSWORD: Anshu123
      DB_PORT: 5432
      REDIS_HOST: redis
      JWT_SECRET: campusflow_super_secret_key_2026
    depends_on:
      - postgres
      - redis

volumes:
  pgdata: